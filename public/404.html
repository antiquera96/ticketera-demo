<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <title>Pulse · Ticketera</title>
    <script>
      // SPA redirect para GitHub Pages: convierte la URL a un querystring
      // y vuelve a index.html, donde un script en index.html restaura la ruta.
      (function () {
        var pathSegmentsToKeep = 1; // ajustar al número de niveles del basename
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
